<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>層積検尺</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b4513">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="層積検尺">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body { font-family: -apple-system, sans-serif; padding: 10px; background: #fdf5e6; color: #333; margin: 0; padding-bottom: 40px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .header { border-bottom: 2px solid #8b4513; margin-bottom: 10px; padding-bottom: 5px; }
        h2 { margin: 0; font-size: 1.2em; color: #5d4037; }
        
        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 1rem; color: white; margin-bottom: 10px; cursor: pointer; text-align: center; box-sizing: border-box;}
        .btn-blue { background: #1565c0; }
        .btn-green { background: #2e7d32; }
        .btn-orange { background: #e65100; }
        .btn-gray { background: #757575; }

        #canvas-container { position: relative; width: 100%; max-height: 60vh; overflow: hidden; border: 1px solid #ccc; background: #000; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; touch-action: none; cursor: crosshair;}
        
        .control-group { margin-bottom: 15px; background: #fff3e0; padding: 10px; border-radius: 8px; border: 1px solid #ffcc80; }
        label { font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px; color: #5d4037;}
        input[type="range"] { width: 100%; margin: 10px 0; cursor: pointer;}
        input[type="number"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; box-sizing: border-box; margin-bottom: 5px;}
        
        .result-box { background: #e8f5e9; border: 2px solid #4caf50; padding: 15px; border-radius: 8px; text-align: center; font-size: 1.2em; font-weight: bold; color: #1b5e20; }
        #status-text { color: #d32f2f; font-weight: bold; font-size: 0.9em; margin-bottom: 10px; text-align: center; }
        
        .color-preview { display: inline-block; width: 20px; height: 20px; border: 1px solid #000; vertical-align: middle; margin-left: 10px; }
        
        .toggle-box { margin-top: 15px; padding: 10px; background: #fff; border-radius: 6px; border: 1px solid #ccc; }
        .toggle-label { display: flex; align-items: center; margin: 0; color: #1565c0; cursor: pointer; }
        .toggle-checkbox { width: auto; margin: 0 10px 0 0; transform: scale(1.3); }
        .toggle-desc { font-size: 0.8em; color: #666; margin-left: 5px; font-weight: normal; }

        /* 消しゴム用ツールバー */
        .toolbar { display: flex; gap: 5px; margin-bottom: 10px; }
        .tool-btn { flex: 1; padding: 10px; border: 2px solid #ccc; border-radius: 6px; background: #eee; text-align: center; font-weight: bold; cursor: pointer;}
        .tool-btn.active { background: #ffcc80; border-color: #e65100; color: #e65100; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h2>層積検尺 v1.2<span style="font-size:0.7em; color:#757575;">(C材概算用)</span></h2></div>
    
    <label class="btn btn-blue">
        📸 写真を撮る / 選ぶ
        <input type="file" id="imageInput" accept="image/*" capture="environment" style="display: none;">
    </label>

    <div id="status-text">1. 写真を読み込んでください</div>

    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="control-group">
        <label>① 抽出する色（丸太の断面をタップ） <span id="colorBox" class="color-preview"></span></label>
        <button class="btn btn-gray" id="btnPickColor" onclick="setMode('color')">👆 基準の色をスポイトで取る</button>
        
        <label>② 色の許容範囲 (スライダーで調整)</label>
        <input type="range" id="toleranceSlider" min="10" max="150" value="40" oninput="processColor()">
    </div>

    <div class="control-group">
        <label>③ 測量ポールで縮尺を設定（画面上の両端をタップ）</label>
        <button class="btn btn-orange" id="btnSetScale" onclick="setMode('scale')">📏 ポールの両端を2箇所タップする</button>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <div style="flex: 1;">
                <label>ポールの実寸(m)</label>
                <input type="number" id="poleLength" value="2.0" step="0.1" onchange="calculateVolume()">
            </div>
            <div style="flex: 1;">
                <label>丸太の奥行き(m)</label>
                <input type="number" id="logDepth" value="4.0" step="0.1" onchange="calculateVolume()">
            </div>
        </div>
        
        <div class="toggle-box">
            <label class="toggle-label">
                <input type="checkbox" id="correctionToggle" class="toggle-checkbox" checked onchange="calculateVolume()">
                <span>断面補正（× 4 / 3.141）<br><span class="toggle-desc">※実面積から末口自乗法へ換算</span></span>
            </label>
        </div>
    </div>

    <div class="control-group" style="background: #e1f5fe; border-color: #81d4fa;">
        <label>④ 🎨 不要な赤色を消去 / 補正（消しゴム）</label>
        <div class="toolbar">
            <div class="tool-btn" id="tool-pan" onclick="setMode('pan')">✋ スクロール</div>
            <div class="tool-btn active" id="tool-eraser" onclick="setMode('eraser')">⚪️ 消しゴム</div>
            <div class="tool-btn" id="tool-paint" onclick="setMode('paint')">🔴 書き足し</div>
        </div>
        <label>ブラシの太さ</label>
        <input type="range" id="brushSizeSlider" min="5" max="100" value="30">
        <button class="btn btn-gray" style="background: #607d8b; padding: 8px; margin-bottom: 0;" onclick="resetColor()">🔄 抽出をリセット（やり直し）</button>
    </div>

    <div class="result-box">
        概算材積: <span id="resultVolume" style="font-size: 1.5em; color: #d32f2f;">0.000</span> m³
        <div style="font-size: 0.6em; color: #555; margin-top: 5px;">
            抽出面積: <span id="resultArea">0.000</span> m² / ピクセル数: <span id="pixelCount">0</span> px
        </div>
    </div>
</div>

<script>
    // サービスワーカーの登録
    window.addEventListener('load', () => {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('ServiceWorker registered!', reg))
                .catch(err => console.log('ServiceWorker failed!', err));
        }
    });

    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const statusText = document.getElementById('status-text');
    const toleranceSlider = document.getElementById('toleranceSlider');
    const brushSizeSlider = document.getElementById('brushSizeSlider');
    
    let originalImage = null;
    let targetColor = { r: 139, g: 69, b: 19 }; // 初期値（茶色）
    let currentMode = 'eraser'; // デフォルトは消しゴム 'pan', 'color', 'scale1', 'scale2', 'eraser', 'paint'
    let scalePoints = [];
    let pixelsPerMeter = 0;
    let extractedPixelCount = 0;

    // お絵描き（消しゴム）用
    let isDrawing = false;
    let extractedMaskCanvas = null; // 抽出結果だけを保持する裏キャンバス
    let extractedMaskCtx = null;

    // 画像読み込み
    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const maxWidth = 1200;
                let width = img.width;
                let height = img.height;
                if (width > maxWidth) {
                    height = Math.floor(height * (maxWidth / width));
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);
                originalImage = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // マスクキャンバスの初期化
                if (!extractedMaskCanvas) {
                    extractedMaskCanvas = document.createElement('canvas');
                }
                extractedMaskCanvas.width = width;
                extractedMaskCanvas.height = height;
                extractedMaskCtx = extractedMaskCanvas.getContext('2d', { willReadFrequently: true });
                extractedMaskCtx.clearRect(0, 0, width, height);
                
                statusText.innerText = "2. 「スポイト」で丸太の色を取り、スライダーで抽出";
                statusText.style.color = "#1565c0";
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    function setMode(mode) {
        if (!originalImage) return alert("先に写真を読み込んでください");
        currentMode = mode;
        
        // ツールのボタンの見た目を更新
        const tools = ['pan', 'eraser', 'paint'];
        tools.forEach(t => {
            const btn = document.getElementById(`tool-${t}`);
            if (t === mode) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        if (mode === 'color') {
            statusText.innerText = "👆 画像内の【丸太の茶色い部分】をタップしてください";
            statusText.style.color = "#d32f2f";
        } else if (mode === 'scale') {
            currentMode = 'scale1';
            scalePoints = [];
            statusText.innerText = "📏 測量ポールの【1点目】をタップしてください";
            statusText.style.color = "#e65100";
        } else if (mode === 'eraser' || mode === 'paint') {
            statusText.innerText = "🎨 白い部分（消しゴム）で不要な赤色をなぞって消します。赤いブラシは書き足し。";
            statusText.style.color = "#01579b";
        }
    }

    // キャンバスのタップ・描画処理（マウス・タッチ統合）
    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        const x = Math.floor((clientX - rect.left) * scaleX);
        const y = Math.floor((clientY - rect.top) * scaleY);
        return {x, y};
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);

    canvas.addEventListener('touchstart', (e) => {
        if (currentMode === 'eraser' || currentMode === 'paint') {
            e.preventDefault(); // スクロール防止
            startDrawing(e);
        }
    });
    canvas.addEventListener('touchmove', (e) => {
        if (currentMode === 'eraser' || currentMode === 'paint') {
            e.preventDefault();
            draw(e);
        }
    });
    window.addEventListener('touchend', stopDrawing);

    function startDrawing(e) {
        if (currentMode === 'eraser' || currentMode === 'paint') {
            isDrawing = true;
            draw(e); // 開始点を描画
        } else if (currentMode === 'color' || currentMode === 'scale1' || currentMode === 'scale2') {
            handleSingleTap(e);
        }
    }

    function stopDrawing() {
        if (isDrawing) {
            isDrawing = false;
            extractedMaskCtx.beginPath(); // パスをリセット
            finalComposite(); // 描画内容を反映して計算
        }
    }

    function draw(e) {
        if (!isDrawing || !extractedMaskCtx || (!originalImage)) return;
        
        const {x, y} = getCanvasCoords(e);
        const brushSize = parseInt(brushSizeSlider.value);

        extractedMaskCtx.lineWidth = brushSize;
        extractedMaskCtx.lineCap = 'round';

        if (currentMode === 'eraser') {
            // 消しゴム：マスクキャンバスを透明にする
            extractedMaskCtx.globalCompositeOperation = 'destination-out';
            extractedMaskCtx.strokeStyle = 'rgba(0,0,0,1)'; 
        } else if (currentMode === 'paint') {
            // 書き足し：マスクキャンバスに不透明な色を塗る
            extractedMaskCtx.globalCompositeOperation = 'source-over';
            extractedMaskCtx.strokeStyle = 'rgba(255,0,0,1)'; // 色は何でも良い（不透明なら）
        } else {
            return;
        }

        // 描画
        extractedMaskCtx.lineTo(x, y);
        extractedMaskCtx.stroke();
        extractedMaskCtx.beginPath();
        extractedMaskCtx.moveTo(x, y);
        
        // 描画中の結果を表示（リアルタイムフィードバック）
        compositeDuringDrawing(); 
    }

    // 単発タップ処理（スポイト、スケール）
    function handleSingleTap(e) {
        if (!originalImage) return;
        
        const {x, y} = getCanvasCoords(e);

        if (currentMode === 'color') {
            const pixel = originalImage.data;
            const index = (y * canvas.width + x) * 4;
            targetColor = { r: pixel[index], g: pixel[index+1], b: pixel[index+2] };
            document.getElementById('colorBox').style.backgroundColor = `rgb(${targetColor.r},${targetColor.g},${targetColor.b})`;
            
            currentMode = 'eraser'; // 自動で消しゴムモードに戻す
            statusText.innerText = "🎨 スライダー調整後、消しゴムで土や影を消してください。";
            statusText.style.color = "#01579b";
            setMode('eraser');
            processColor(); 

        } else if (currentMode === 'scale1') {
            scalePoints.push({x, y});
            drawPoint(x, y, '#00ff00');
            currentMode = 'scale2';
            statusText.innerText = "📏 測量ポールの【2点目】をタップしてください";
            
        } else if (currentMode === 'scale2') {
            scalePoints.push({x, y});
            drawPoint(x, y, '#00ff00');
            drawLine(scalePoints[0], scalePoints[1], '#00ff00');
            
            const dx = scalePoints[1].x - scalePoints[0].x;
            const dy = scalePoints[1].y - scalePoints[0].y;
            const pixelDist = Math.sqrt(dx*dx + dy*dy);
            
            const realPoleMeters = parseFloat(document.getElementById('poleLength').value);
            if (realPoleMeters <= 0) { alert("正しいポールの実寸を入力してください"); pixelsPerMeter = 0; return; }
            pixelsPerMeter = pixelDist / realPoleMeters; 
            
            currentMode = 'eraser';
            statusText.innerText = "✅ スケール完了。土の赤色は消しゴムで消してください。";
            statusText.style.color = "#01579b";
            setMode('eraser');
            finalComposite(); // 再描画
        }
    }

    // 抽出処理リセット
    function resetColor() {
        if (!originalImage) return;
        if (confirm("現在の色抽出と消しゴム補正をリセットしますか？")) {
            extractedMaskCtx.clearRect(0, 0, extractedMaskCanvas.width, extractedMaskCanvas.height);
            processColor(); // スライダー値で再抽出
        }
    }

    // ①色の抽出処理（スライダーを動かすと呼ばれる）
    function processColor() {
        if (!originalImage || !extractedMaskCtx) return;
        
        const tolerance = parseInt(toleranceSlider.value);
        const data = originalImage.data;
        
        // マスクキャンバスを初期化（スライダー値に基づいて再生成）
        extractedMaskCtx.clearRect(0, 0, extractedMaskCanvas.width, extractedMaskCanvas.height);
        // マスク用に一時的な ImageData を作成
        const maskData = new ImageData(canvas.width, canvas.height);
        const md = maskData.data;

        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i+1];
            const b = data[i+2];
            
            const distance = Math.sqrt(
                Math.pow(r - targetColor.r, 2) + 
                Math.pow(g - targetColor.g, 2) + 
                Math.pow(b - targetColor.b, 2)
            );

            if (distance < tolerance) {
                // 丸太と判定された箇所をマスクに「不透明な赤」で塗る
                md[i] = 255;   // R
                md[i+1] = 0;   // G
                md[i+2] = 0;   // B
                md[i+3] = 255; // Alpha
            }
        }
        extractedMaskCtx.putImageData(maskData, 0, 0);
        finalComposite(); // 描画と計算
    }

    // ②お絵描き中のリアルタイム表示
    function compositeDuringDrawing() {
        if (!originalImage) return;
        
        // 元画像を描画
        ctx.putImageData(originalImage, 0, 0);
        
        // マスク（抽出結果＋消しゴムお絵描き）を半透明で重ねる
        ctx.save();
        ctx.globalAlpha = 0.6; // 抽出部分の透明度
        ctx.fillStyle = 'red'; // 抽出部分を表示する色

        // マスクキャンバス自体が透明度を管理している
        // destination-in で元画像とマスクの不透明部分を掛け合わせる
        // source-over でマスクを半透明の赤として重ねる

        // 今回は単純に、マスクを「半透明の赤色」として重ね書き
        ctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(extractedMaskCanvas, 0, 0);
        
        ctx.restore();
    }

    // ③描画停止後、最終的な合成とピクセル数計算
    function finalComposite() {
        if (!originalImage || !extractedMaskCtx) return;

        // まずリアルタイム表示と同じ描画を行う
        compositeDuringDrawing();
        
        // ★重要：実際のピクセル数をカウントする
        // マスクキャンバスの ImageData を取得して、不透明なピクセルを数える
        const maskData = extractedMaskCtx.getImageData(0, 0, canvas.width, canvas.height).data;
        extractedPixelCount = 0;
        for (let i = 3; i < maskData.length; i += 4) {
            if (maskData[i] > 128) { // 不透明度が一定以上のピクセルをカウント
                extractedPixelCount++;
            }
        }
        
        // スケール線が設定されていれば再描画
        if (scalePoints.length === 2) {
            drawPoint(scalePoints[0].x, scalePoints[0].y, '#00ff00');
            drawPoint(scalePoints[1].x, scalePoints[1].y, '#00ff00');
            drawLine(scalePoints[0], scalePoints[1], '#00ff00');
        }
        
        document.getElementById('pixelCount').innerText = extractedPixelCount.toLocaleString();
        calculateVolume();
    }

    // 体積計算
    function calculateVolume() {
        if (pixelsPerMeter === 0 || extractedPixelCount === 0) {
             document.getElementById('resultArea').innerText = "0.000";
             document.getElementById('resultVolume').innerText = "0.000";
             return;
        }
        
        const meterPerPixel = 1 / pixelsPerMeter;
        const areaPerPixel = meterPerPixel * meterPerPixel;
        const totalAreaM2 = extractedPixelCount * areaPerPixel;
        
        const depthM = parseFloat(document.getElementById('logDepth').value) || 4.0;
        let volumeM3 = totalAreaM2 * depthM;
        
        if (document.getElementById('correctionToggle').checked) {
            volumeM3 = volumeM3 * (4 / 3.141);
        }
        
        document.getElementById('resultArea').innerText = totalAreaM2.toFixed(3);
        document.getElementById('resultVolume').innerText = volumeM3.toFixed(3);
    }

    // 描画ヘルパー
    function drawPoint(x, y, color) {
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, 2 * Math.PI);
        ctx.fillStyle = color; ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
    }
    
    function drawLine(p1, p2, color) {
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.stroke();
    }
</script>
</body>
</html>
